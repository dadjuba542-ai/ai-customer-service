<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI宝儿智能体</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
</head>
<body>
  <div id="identity-gate" class="admin-overlay active" onclick="event.stopPropagation();">
    <div class="login-card" style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:min(90vw,360px);">
      <div class="login-header" style="margin-bottom:18px;">
        <div class="login-title" style="font-size:22px;">开始咨询</div>
        <div class="login-subtitle">请选择团队并输入姓名</div>
      </div>
      <div class="input-group">
        <i class="ph ph-users-three"></i>
        <select id="team-select" style="width:100%;padding:14px 16px 14px 46px;font-size:15px;font-family:inherit;background:var(--slate-50);border:2px solid transparent;border-radius:var(--radius-xl);outline:none;">
          <option value="">请选择团队</option>
        </select>
      </div>
      <div class="input-group">
        <i class="ph ph-user"></i>
        <input id="member-name-input" type="text" placeholder="请输入姓名" maxlength="20">
      </div>
      <button class="btn-primary" onclick="submitIdentity()">进入系统</button>
    </div>
  </div>

  <div id="app" class="page active">
    <div id="app-container">
      <!-- Home View -->
      <div id="home-view" class="view active">
        <div class="home-content">
          <div class="home-header">
            <div class="home-greeting">
              <p class="greeting-line1">你好👋</p>
              <p class="greeting-line2">我是AI宝儿</p>
              <p class="greeting-line3">今天想让我为你做点什么</p>
            </div>
            <div class="avatar-ring">
              <img src="/avatar.png" class="avatar-img" alt="avatar">
            </div>
          </div>
          <div class="section">
            <div class="section-header">
              <h3 class="section-title">快捷功能</h3>
            </div>
            <div class="quick-grid" id="quick-grid"></div>
          </div>
          <div class="section">
            <div class="section-header">
              <h3 class="section-title">热门问题</h3>
            </div>
            <div class="hot-tags" id="hot-tags"></div>
          </div>
          <div class="section">
            <div class="section-header">
              <h3 class="section-title">最新资讯</h3>
            </div>
            <div class="news-list" id="home-news"></div>
            <button class="view-all-link" onclick="switchView('discover')">查看全部 <i class="ph ph-arrow-right"></i></button>
          </div>
        </div>
      </div>

      <!-- Chat View -->
      <div id="chat-view" class="view">
        <header class="chat-header">
          <div class="chat-header-top">
            <button class="icon-btn" onclick="switchView('home')"><i class="ph ph-caret-left"></i></button>
            <div class="chat-agent-info">
              <span class="chat-agent-name" id="chat-agent-name">产品资料查询</span>
            </div>
            <button class="icon-btn" onclick="toggleChatMenu(event)"><i class="ph ph-dots-three-vertical"></i></button>
              <div class="chat-menu" id="chat-menu">
                <div class="chat-menu-item" onclick="shareChat()"><i class="ph ph-share-fat"></i> 分享对话</div>
                <div class="chat-menu-item danger" onclick="clearChat()"><i class="ph ph-trash"></i> 清空对话</div>
              </div>
          </div>
          <div class="agent-tabs" id="agent-tabs"></div>
        </header>
        <div class="chat-messages" id="chat-messages">
          <div class="empty-chat" id="empty-chat">
            <i class="ph ph-sparkle"></i>
            <p>开始一段新的对话吧</p>
          </div>
        </div>
        <div class="chat-input-area">
          <div class="input-wrapper">
            <button class="input-plus"><i class="ph ph-plus"></i></button>
            <textarea id="message-input" rows="1" placeholder="说点什么..." onkeydown="handleInputKeydown(event)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="ph ph-paper-plane-right"></i></button>
          </div>
          <button class="scroll-bottom-btn" id="scroll-bottom-btn" onclick="scrollToBottom()">
            <i class="ph ph-arrow-down"></i>
          </button>
        </div>
      </div>

      <!-- Products View -->
      <div id="products-view" class="view">
        <header class="memory-header" style="border-bottom:none">
          <h1 class="memory-title">产品中心</h1>
        </header>
        <div class="products-content" id="products-content">
          <div class="products-loading"><i class="ph ph-spinner"></i> 加载中...</div>
        </div>
      </div>

      <!-- Discover View -->
      <div id="discover-view" class="view">
        <header class="memory-header">
          <h1 class="memory-title">发现</h1>
        </header>
        <div class="discover-content" id="discover-content">
          <div class="category-tabs" id="category-tabs">
            <button class="category-tab active" onclick="filterCategory('')">全部</button>
          </div>
          <div class="discover-carousel-wrap" id="discover-carousel-wrap" style="display:none">
            <div class="discover-carousel" id="discover-carousel"></div>
            <div class="carousel-dots" id="carousel-dots"></div>
          </div>
          <div class="discover-list" id="discover-list"></div>
          <div class="discover-more-wrap" id="discover-more-wrap" style="display:none">
            <button class="discover-more-btn" onclick="loadMoreNews()">加载更多</button>
          </div>
        </div>
      </div>

      <!-- Community View -->
      <div id="community-view" class="view">
        <header class="memory-header">
          <h1 class="memory-title">社区</h1>
        </header>
        <div class="community-content">
          <div class="community-tabs">
            <button class="community-tab" onclick="switchCommunityTab('memory')">我的对话</button>
            <button class="community-tab active" onclick="switchCommunityTab('qa')">问答墙</button>
          </div>
          <div id="community-tab-memory" class="community-panel">
            <div class="memory-filter">
              <select id="memory-filter" onchange="loadHistory(this.value)">
                <option value="">全部类型</option>
                <option value="产品咨询">产品咨询</option>
                <option value="使用答疑">使用答疑</option>
                <option value="朋友圈帮写">朋友圈帮写</option>
                <option value="口播文案帮写">口播文案</option>
              </select>
            </div>
            <div class="memory-list" id="memory-list"></div>
          </div>
          <div id="community-tab-qa" class="community-panel active">
            <div class="qa-list" id="qa-list"></div>
            <div class="qa-more-wrap" id="qa-more-wrap" style="display:none">
              <button class="discover-more-btn" onclick="loadMoreQA()">加载更多</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchView('home')" data-view="home">
          <i class="ph ph-house"></i><span>首页</span>
        </button>
        <button class="nav-item" onclick="switchView('products')" data-view="products">
          <i class="ph ph-shopping-bag"></i><span>产品</span>
        </button>
        <div class="nav-ai-wrap">
          <button class="nav-ai-btn" onclick="switchView('chat')"><i class="ph ph-sparkle"></i></button>
        </div>
        <button class="nav-item" onclick="switchView('discover')" data-view="discover">
          <i class="ph ph-compass"></i><span>发现</span>
        </button>
        <button class="nav-item" onclick="switchView('community')" data-view="community">
          <i class="ph ph-users-three"></i><span>社区</span>
        </button>
      </nav>

      <!-- News Detail Overlay -->
      <div id="news-detail-overlay" class="admin-overlay">
        <div class="news-detail-panel">
          <header class="news-detail-header">
            <button class="icon-btn" onclick="closeNewsDetail()"><i class="ph ph-x"></i></button>
          </header>
          <div class="news-detail-scroll" id="news-detail-content"></div>
        </div>
      </div>

      <!-- Product Detail Overlay -->
      <div id="product-detail-overlay" class="admin-overlay">
        <div class="news-detail-panel">
          <header class="news-detail-header">
            <button class="icon-btn" onclick="closeProductDetail()"><i class="ph ph-x"></i></button>
          </header>
          <div class="news-detail-scroll" id="product-detail-content"></div>
          <div class="product-detail-cta">
            <button class="product-cta-btn" id="product-cta-btn" onclick="consultProduct()">
              <i class="ph ph-chat-circle-text"></i> 立即咨询
            </button>
          </div>
        </div>
      </div>

      <!-- Share Preview Overlay -->
      <div id="share-overlay" class="admin-overlay" onclick="closeSharePreview(event)">
        <div class="share-panel" onclick="event.stopPropagation()">
          <div class="share-panel-header">
            <span class="share-panel-title">分享截图</span>
            <button class="icon-btn" onclick="closeSharePreview()"><i class="ph ph-x"></i></button>
          </div>
          <div class="share-panel-body">
            <div class="share-image-wrap" id="share-image-wrap">
              <div class="share-loading"><i class="ph ph-spinner-gap"></i> 生成中...</div>
            </div>
          </div>
          <div class="share-panel-footer">
            <p class="share-tip"><i class="ph ph-hand-fist"></i> 长按图片即可保存分享</p>
          </div>
        </div>
      </div>

      <!-- Hidden Share Card -->
      <div id="share-card" class="share-card" style="position:fixed;left:-9999px;top:0;width:390px;background:#fff;padding:24px;font-family:'Inter',sans-serif;z-index:-1;">
        <div id="share-card-content"></div>
      </div>

      <!-- Nickname Modal -->
      <div id="nickname-overlay" class="admin-overlay" onclick="closeNicknameModal(event)">
        <div class="nickname-modal" onclick="event.stopPropagation()">
          <div class="nickname-header">输入你的昵称</div>
          <input type="text" id="nickname-input" placeholder="你的昵称" maxlength="20" class="nickname-input">
          <div class="nickname-actions">
            <button class="btn btn-primary btn-sm" onclick="confirmNickname()">确定</button>
          </div>
        </div>
      </div>

      <!-- Reason Popup -->
      <div id="reason-popup" class="reason-popup"></div>

      <!-- Survey Overlay -->
      <div id="survey-overlay" class="admin-overlay" onclick="event.stopPropagation();">
        <div class="survey-modal">
          <div class="survey-title">最近用下来感觉怎么样？</div>
          <div class="survey-options">
            <button class="survey-btn" onclick="submitSurvey(3)"><i class="ph ph-smiley"></i> 很好</button>
            <button class="survey-btn" onclick="submitSurvey(2)"><i class="ph ph-meh"></i> 还行</button>
            <button class="survey-btn" onclick="submitSurvey(1)"><i class="ph ph-frown"></i> 不太好</button>
          </div>
        </div>
      </div>

      <!-- Question Detail Overlay -->
      <div id="qdetail-overlay" class="admin-overlay" onclick="closeQDetail(event)">
        <div class="qdetail-panel" onclick="event.stopPropagation()">
          <div class="qdetail-header">
            <button class="icon-btn" onclick="closeQDetail()"><i class="ph ph-x"></i></button>
          </div>
          <div class="qdetail-scroll" id="qdetail-content"></div>
          <div class="qdetail-reply-box">
            <div class="qdetail-reply-input-wrap">
              <span class="qdetail-nickname-label" id="qdetail-username" contenteditable="false"></span>
              <textarea id="qdetail-reply-input" rows="1" placeholder="写回复..." maxlength="500"></textarea>
              <button class="qdetail-send-btn" onclick="submitReply()"><i class="ph ph-paper-plane-right"></i></button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>
  <script src="app.js"></script>
</body>
</html>
